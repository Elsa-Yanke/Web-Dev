<h2>Album Detail</h2>

@if (loading()) {
  <p>Loading...</p>
} @else if (error()) {
  <p class="error">{{ error() }}</p>
} @else if (album()) {

  <p>Id: {{ album()!.id }}</p>
  <p>UserId: {{ album()!.userId }}</p>

  <label>
    Title:
    <input [(ngModel)]="editedTitle" />
  </label>

  <div style="margin-top: 10px;">
    <button (click)="save()" [disabled]="saving()">Save</button>

    <a [routerLink]="['/albums', album()!.id, 'photos']">View Photos</a>

    <button (click)="back()">Back</button>
  </div>
}
