<h2>Categories</h2>

<div class="categories">
  <button
    *ngFor="let c of categories"
    (click)="selectCategory(c.id)"
    [class.active]="c.id === selectedCategoryId"
  >
    {{ c.name }}
  </button>
</div>

<div *ngIf="selectedCategoryId === null" class="empty">
  Choose a category to see products
</div>

<app-product-list
  *ngIf="selectedCategoryId !== null"
  [products]="filteredProducts"
  (deleteProduct)="handleDelete($event)"
  (likeProduct)="handleLike($event)"
></app-product-list>
