<h2>Categories</h2>

<div class="categories">
  <button
    *ngFor="let c of categories"
    (click)="selectCategory(c.id)"
    [class.active]="c.id === selectedCategoryId"
  >
    {{ c.name }}
  </button>
</div>

<div *ngIf="selectedCategoryId === null" class="empty">
  Choose a category to see products
</div>

<!-- ✅ FAVORITES ВВЕРХУ -->
<h2>★ Favorites ({{ favorites.length }})</h2>
<p *ngIf="favorites.length === 0">No favorite products yet</p>

<app-product-list
  *ngIf="favorites.length > 0"
  [products]="favorites"
  (deleteProduct)="handleDelete($event)"
  (likeProduct)="handleLike($event)"
  (favorite)="toggleFavorite($event)"
></app-product-list>

<!-- ✅ PRODUCTS -->
<app-product-list
  *ngIf="selectedCategoryId !== null"
  [products]="filteredProducts"
  (deleteProduct)="handleDelete($event)"
  (likeProduct)="handleLike($event)"
  (favorite)="toggleFavorite($event)"
></app-product-list>
